
<div style="font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; text-align: center;">
    <h2>Баланс вложений</h2>
    
    <div style="display: flex; justify-content: space-between; margin-bottom: 40px;">
        <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; width: 45%;">
            <h3>Мой вклад</h3>
            <label>Внимание (в баллах):</label><br>
            <input type="number" id="my-attention" value="0" oninput="calculateScale()"><br><br>
            <label>Деньги (в валюте):</label><br>
            <input type="number" id="my-money" value="0" oninput="calculateScale()">
        </div>

        <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; width: 45%;">
            <h3>Вклад партнера</h3>
            <label>Внимание (в баллах):</label><br>
            <input type="number" id="partner-attention" value="0" oninput="calculateScale()"><br><br>
            <label>Деньги (в валюте):</label><br>
            <input type="number" id="partner-money" value="0" oninput="calculateScale()">
        </div>
    </div>

    <div id="scale-wrapper" style="margin-top: 50px; position: relative;">
        <div id="scale-beam" style="
            width: 80%; 
            height: 12px; 
            background-color: #4CAF50; 
            margin: 0 auto; 
            border-radius: 10px;
            transform-origin: center; 
            transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            z-index: 2;">
            
            <div style="position: absolute; left: 0; top: 12px; width: 40px; height: 40px; background: #ddd; border-radius: 0 0 20px 20px; transform: translateX(-50%);"></div>
            <div style="position: absolute; right: 0; top: 12px; width: 40px; height: 40px; background: #ddd; border-radius: 0 0 20px 20px; transform: translateX(50%);"></div>
        </div>
        
        <div style="
            width: 0; 
            height: 0; 
            border-left: 30px solid transparent; 
            border-right: 30px solid transparent; 
            border-bottom: 60px solid #333; 
            margin: -6px auto 0 auto;
            position: relative;
            z-index: 1;">
        </div>
    </div>
</div>

<script>
    function calculateScale() {
        // Получаем значения из инпутов (если пусто, считаем как 0)
        let myAttention = parseFloat(document.getElementById('my-attention').value) || 0;
        let myMoney = parseFloat(document.getElementById('my-money').value) || 0;
        
        let partnerAttention = parseFloat(document.getElementById('partner-attention').value) || 0;
        let partnerMoney = parseFloat(document.getElementById('partner-money').value) || 0;

        // Считаем общую сумму вложений для каждого
        let myTotal = myAttention + myMoney;
        let partnerTotal = partnerAttention + partnerMoney;

        // Находим разницу
        let difference = partnerTotal - myTotal; 

        // Ограничиваем максимальный угол наклона до 35 градусов, чтобы весы не переворачивались вверх дном
        // Коэффициент "100" здесь условный, вы можете его менять в зависимости от масштаба ваших цифр
        let angle = difference / 100; 
        
        if (angle > 35) angle = 35;
        if (angle < -35) angle = -35;

        // Применяем наклон к перекладине
        document.getElementById('scale-beam').style.transform = `rotate(${angle}deg)`;
    }
</script>
