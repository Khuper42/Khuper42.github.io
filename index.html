<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Александр Нажм-Эд-Дин | Личный водитель</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #131314; color: #e3e3e3; display: flex; height: 100vh; }
        .sidebar { width: 280px; background-color: #1e1f20; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .btn-new { background: #1a1a1c; border: 1px solid #444746; color: #c2e7ff; padding: 12px; border-radius: 50px; text-decoration: none; text-align: center; }
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 40px; overflow-y: auto; }
        .message { margin-bottom: 30px; line-height: 1.6; max-width: 800px; }
        .user-box { background: #282a2c; padding: 15px 20px; border-radius: 20px; align-self: flex-end; margin-bottom: 20px; }
        .ai-box { display: flex; gap: 15px; align-items: flex-start; }
        .avatar { width: 30px; height: 30px; background: linear-gradient(135deg, #4285f4, #9b72cb); border-radius: 50%; }
        #typing-text { white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="sidebar">
    <a href="https://wa.me/79990000000" class="btn-new">Связаться со мной</a>
</div>

<div class="main-content">
    <div class="message user-box">
        Расскажи о себе. Какой у тебя опыт вождения и подход к работе?
    </div>

    <div class="message ai-box">
        <div class="avatar"></div>
        <div id="typing-text"></div>
    </div>
</div>

<script>
    const text = "Статус актуально: Ищу комфортную работу личным водителем.\n\nМне 29 лет. Уверенный водитель. Езжу с умом, заранее просчитывая маршрут. Из тех, кто смотрит за 100 метров вперед и просчитывает движения по полосам и светофорам. Имею базовый опыт в обслуживании автомобиля.";
    const element = document.getElementById("typing-text");
    let i = 0;

    function typeWriter() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, 30); // Скорость печати
        }
    }
    
    // Запуск анимации при загрузке
    window.onload = typeWriter;
</script>

</body>
</html>
