<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ищу работу семейным водителем</title>
    <style>
        body { font-family: 'YS Text', sans-serif; margin: 0; color: #111; line-height: 1.5; }
        header { padding: 40px 20px; text-align: center; background: #f8f8f8; }
        h1 { font-size: 3rem; margin-bottom: 20px; }
        .hero-img { width: 100%; max-width: 800px; height: 300px; background: #e0e0e0; margin: 20px auto; border-radius: 12px; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .section { display: flex; align-items: center; gap: 40px; margin-bottom: 60px; }
        .placeholder-box { min-width: 300px; height: 200px; background: #e0e0e0; border-radius: 12px; }
        .text-box h2 { font-size: 1.8rem; margin-top: 0; }
        .btn { display: inline-block; padding: 15px 30px; background: #000; color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; }
        @media (max-width: 768px) { .section { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>

<header>
    <h1>Ищу работу семейным водителем</h1>
    <div class="hero-img"></div>
    <a href="https://wa.me/79990000000" class="btn">Связаться со мной</a>
</header>

<div class="container">
    
    <div class="section">
        <div class="placeholder-box"></div>
        <div class="text-box">
            <h2>Подстроюсь под вас</h2>
            <p>Решайте сами, когда мне выезжать к вам и сколько времени выполнять работу.</p>
        </div>
    </div>

    <div class="section">
        <div class="text-box">
            <h2>Помогу с делами</h2>
            <p>Помогу с делами, привезу товар для дома, вовремя обслужу и подготовлю автомобиль.</p>
        </div>
        <div class="placeholder-box"></div>
    </div>

</div>

</body>
</html>
