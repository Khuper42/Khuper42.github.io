<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Резюме - Александр Нажм-Эд-Дин</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #131314;
            color: #e3e3e3;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Боковая панель */
        .sidebar {
            width: 280px;
            background-color: #1e1f20;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn-new-chat {
            background-color: #1a1a1c;
            color: #c2e7ff;
            padding: 15px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #444746;
            width: fit-content;
        }

        .btn-new-chat:hover {
            background-color: #282a2c;
        }

        .history-title {
            font-size: 14px;
            color: #c4c7c5;
            margin-bottom: 10px;
            padding-left: 10px;
        }

        .btn-history {
            background-color: #282a2c;
            color: #e3e3e3;
            padding: 12px 15px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 14px;
            display: block;
            cursor: pointer;
            border: none;
            text-align: left;
        }

        /* Основной контент */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 20px 25px;
            font-size: 18px;
            color: #e3e3e3;
            display: flex;
            align-items: center;
            font-weight: 500;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15%;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* Сообщение "Пользователя" (Работодателя) */
        .user-message {
            align-self: flex-end;
            background-color: #282a2c;
            padding: 15px 25px;
            border-radius: 25px;
            font-size: 16px;
            max-width: 80%;
            line-height: 1.5;
        }

        /* Ответ "ИИ" (Ваше резюме) */
        .ai-message {
            align-self: flex-start;
            max-width: 90%;
            line-height: 1.6;
            font-size: 16px;
            display: flex;
            gap: 20px;
        }

        .ai-avatar {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #4285f4, #9b72cb, #d96570);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .ai-content {
            color: #e3e3e3;
        }

        .status-badge {
            display: inline-block;
            background-color: #0f5223;
            color: #aff4c6;
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .ai-content p {
            margin-top: 0;
            margin-bottom: 15px;
        }

        /* Имитация строки ввода */
        .input-area {
            padding: 20px 15%;
            padding-bottom: 40px;
        }

        .input-box {
            background-color: #1e1f20;
            border-radius: 30px;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            color: #8e8e8e;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <a href="https://wa.me/79990000000" class="btn-new-chat">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            Связаться со мной
        </a>
        
        <div style="margin-top: 20px;">
            <div class="history-title">Недавние</div>
            <button class="btn-history">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24" style="vertical-align: middle; margin-right: 8px;"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                Обо мне
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            Сайт-визитка Александр Нажм-Эд-Дин
        </div>

        <div class="chat-area">
            
            <div class="user-message">
                Расскажи о себе. Какой у тебя опыт вождения и подход к работе?
            </div>

            <div class="ai-message">
                <div class="ai-avatar"></div>
                <div class="ai-content">
